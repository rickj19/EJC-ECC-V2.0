<!-- 
    Arquivo: public/teste-upload.html
    Descrição: Página isolada para diagnóstico de upload no Supabase Storage.
    Permite testar o envio de arquivos e a geração de URLs públicas.
-->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Upload Supabase - Diagnóstico</title>
    <!-- Tailwind CSS para estilização rápida -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- CSS customizado da paróquia -->
    <link rel="stylesheet" href="/css/style.css">
    <!-- Fontes elegantes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Biblioteca de ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-50 font-['Inter'] min-h-screen flex items-center justify-center p-4 py-12">
    
    <div class="max-w-3xl w-full bg-white p-8 md:p-12 rounded-3xl shadow-xl border border-zinc-100">
        <div class="text-center mb-10">
            <div class="inline-block p-3 bg-indigo-100 text-indigo-600 rounded-full mb-4">
                <i data-lucide="upload-cloud" class="w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-bold text-zinc-900">Teste de Upload Supabase</h1>
            <p class="text-zinc-500 mt-2">Ambiente isolado para diagnóstico de Storage</p>
        </div>

        <div class="space-y-8">
            <!-- Seção 1: Seleção de Arquivo -->
            <div class="bg-zinc-50 p-6 rounded-2xl border border-zinc-200">
                <h2 class="text-lg font-semibold text-zinc-800 mb-4 flex items-center gap-2">
                    <i data-lucide="file-plus" class="w-5 h-5"></i>
                    1. Selecionar Imagem
                </h2>
                <input type="file" id="test-file-input" accept="image/*" class="w-full text-sm text-zinc-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                
                <!-- Preview e Info do Arquivo -->
                <div id="file-info" class="mt-6 hidden animate-fade-in">
                    <div class="flex items-center gap-4 p-4 bg-white rounded-xl border border-zinc-100 shadow-sm">
                        <img id="test-preview" src="#" alt="Preview" class="w-20 h-20 object-cover rounded-lg border border-zinc-200">
                        <div class="flex-grow">
                            <p id="info-name" class="text-sm font-bold text-zinc-900 truncate max-w-[200px]"></p>
                            <p id="info-size" class="text-xs text-zinc-500"></p>
                            <p id="info-type" class="text-xs text-zinc-400"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Seção 2: Ações de Teste -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button id="btn-test-upload" class="flex items-center justify-center gap-3 py-4 bg-indigo-600 text-white rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                    <i data-lucide="send" class="w-5 h-5"></i>
                    Testar Upload (fotos)
                </button>
                <button id="btn-test-url" class="flex items-center justify-center gap-3 py-4 bg-emerald-600 text-white rounded-xl font-bold shadow-lg hover:bg-emerald-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <i data-lucide="link" class="w-5 h-5"></i>
                    Testar URL Pública
                </button>
            </div>

            <!-- Seção 3: Resultados e Logs -->
            <div class="space-y-4">
                <h2 class="text-lg font-semibold text-zinc-800 flex items-center gap-2">
                    <i data-lucide="terminal" class="w-5 h-5"></i>
                    Resultado do Diagnóstico
                </h2>
                
                <!-- Área de Status -->
                <div id="status-area" class="hidden p-4 rounded-xl border text-sm font-medium animate-fade-in"></div>

                <!-- Console de Logs na Tela -->
                <div class="bg-zinc-900 rounded-xl p-4 font-mono text-xs text-zinc-300 overflow-x-auto max-h-60 shadow-inner">
                    <div id="log-console" class="space-y-1">
                        <div class="text-zinc-500 italic">// Aguardando ação...</div>
                    </div>
                </div>
            </div>

            <!-- Seção 4: Preview da URL Pública -->
            <div id="url-result-area" class="hidden bg-emerald-50 p-6 rounded-2xl border border-emerald-200 animate-fade-in">
                <h3 class="text-emerald-800 font-bold mb-3 flex items-center gap-2">
                    <i data-lucide="check-circle" class="w-5 h-5"></i>
                    URL Pública Gerada
                </h3>
                <div class="flex flex-col gap-4">
                    <input type="text" id="public-url-input" readonly class="w-full px-4 py-2 bg-white border border-emerald-200 rounded-lg text-xs text-emerald-700 outline-none">
                    <div class="flex justify-center">
                        <img id="public-url-preview" src="#" alt="Public Preview" class="max-w-full h-48 object-contain rounded-xl border-2 border-white shadow-md">
                    </div>
                </div>
            </div>
        </div>

        <!-- Botão Voltar -->
        <div class="mt-10 text-center">
            <a href="/" class="text-zinc-500 hover:text-zinc-800 transition-colors flex items-center justify-center gap-2 text-sm font-medium">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Voltar ao Início
            </a>
        </div>
    </div>

    <!-- Scripts do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase.js"></script>
    <!-- Script de lógica do teste -->
    <script src="/js/teste-upload.js"></script>
</body>
</html>
