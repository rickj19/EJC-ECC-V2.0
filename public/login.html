<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título dinâmico para a página de login -->
    <title>Login - Portal Paroquial</title>
    <!-- Tailwind CSS para estilização moderna e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- CSS customizado da paróquia para manter a identidade visual -->
    <link rel="stylesheet" href="/css/style.css">
    <!-- Favicon: Representa a identidade da igreja e melhora a aparência profissional do sistema -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <!-- Fontes elegantes para identidade religiosa -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Biblioteca de ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-church-home font-sans min-h-screen flex flex-col items-center">
    
    <!-- Cabeçalho Institucional Comum -->
    <header class="w-full bg-white/90 backdrop-blur-md border-b border-[#D1D5DB] py-4 px-6 flex items-center justify-between sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <img src="/favicon.png" alt="Logo Paróquia" class="w-10 h-10 object-contain">
            <div>
                <h1 class="text-lg md:text-xl font-serif font-bold text-[#5A3B2E] leading-tight">Paróquia de São Francisco das Chagas</h1>
                <p class="text-[10px] text-[#8B5E3C] tracking-[0.2em] uppercase font-bold">Paz e bem</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <a href="/" class="text-xs font-bold text-[#555555] hover:text-[#8B5E3C] transition-colors uppercase tracking-widest">Início</a>
        </div>
    </header>

    <div class="flex-grow flex items-center justify-center p-4 w-full">
        <!-- Container principal do formulário de login: Fundo branco, sombra leve e bordas arredondadas -->
        <div class="max-w-md w-full login-card p-10 animate-slide-up bg-white rounded-[2.5rem] shadow-2xl border border-[#D1D5DB]">
            <div class="text-center mb-10">
                <!-- Badge que indica o tipo de login (EJC, ECC ou ADMIN) -->
                <div id="type-badge" class="inline-block px-4 py-1 rounded-full text-sm font-semibold mb-6"></div>
                <!-- Título: Grande, escuro e bem legível -->
                <h2 class="text-3xl font-serif font-bold text-[#5A3B2E]">Acesse sua conta</h2>
                <!-- Texto secundário: Confortável e com bom contraste -->
                <p class="text-[#555555] mt-3">Entre com suas credenciais para acessar o portal paroquial</p>
            </div>

        <!-- Formulário de Login: Espaçamento aumentado entre campos para facilitar a leitura -->
        <form id="login-form" class="space-y-8">
            <!-- Campo de Usuário -->
            <div class="space-y-3">
                <label for="username" class="login-label">Usuário</label>
                <div class="input-group">
                    <span class="input-icon">
                        <i data-lucide="user" class="w-6 h-6"></i>
                    </span>
                    <input type="text" id="username" required class="login-input" placeholder="Digite seu usuário">
                </div>
            </div>

            <!-- Campo de Senha -->
            <div class="space-y-3">
                <label for="password" class="login-label">Senha</label>
                <div class="input-group">
                    <span class="input-icon">
                        <i data-lucide="lock" class="w-6 h-6"></i>
                    </span>
                    <input type="password" id="password" required class="login-input" placeholder="Sua senha secreta">
                </div>
            </div>

            <!-- Container para mensagens de erro: Cores de alto contraste para acessibilidade -->
            <div id="error-message" class="hidden error-message p-4 rounded-xl font-bold text-center">
                Usuário ou senha incorretos. Por favor, verifique seus dados.
            </div>

            <!-- Botão de submissão do formulário: Marrom médio com texto branco de alto contraste -->
            <button type="submit" id="submit-btn" class="login-button w-full rounded-2xl shadow-lg">
                Entrar no Sistema
            </button>
        </form>

        <!-- Link para voltar à tela inicial: Cor marrom para manter a identidade -->
        <div class="mt-10 text-center border-t border-zinc-100 pt-8">
            <a href="/" class="text-[#8B5E3C] hover:text-[#A47148] font-bold transition-colors flex items-center justify-center gap-2 text-base">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Voltar à página inicial
            </a>
        </div>
    </div>

    <!-- Scripts de lógica de autenticação -->
    <!-- 1. Biblioteca BcryptJS para criptografia no front-end -->
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <!-- 2. Gerenciador de Sessão -->
    <script src="/js/session.js"></script>
    <!-- 3. Biblioteca Supabase via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 4. Configuração do cliente Supabase (inicializa window.supabaseClient) -->
    <script src="/js/supabase.js"></script>
    <!-- 5. Lógica específica da tela de login -->
    <script src="/js/login.js"></script>
    <!-- Favicon Animado: Adiciona um toque de vida à aba do navegador -->
    <script src="/js/favicon-animado.js"></script>
</body>
</html>
