<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EJC & ECC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-50 font-['Inter'] min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl border border-zinc-100 animate-slide-up">
        <div class="text-center mb-8">
            <div id="type-badge" class="inline-block px-4 py-1 rounded-full text-sm font-semibold mb-4"></div>
            <h1 class="text-3xl font-bold text-zinc-900">Acesse sua conta</h1>
            <p class="text-zinc-500 mt-2">Entre com suas credenciais</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div class="space-y-2">
                <label for="username" class="text-sm font-medium text-zinc-700 block">Usuário</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </span>
                    <input type="text" id="username" required class="w-full pl-10 pr-4 py-3 rounded-xl border border-zinc-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all" placeholder="Seu usuário">
                </div>
            </div>

            <div class="space-y-2">
                <label for="password" class="text-sm font-medium text-zinc-700 block">Senha</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </span>
                    <input type="password" id="password" required class="w-full pl-10 pr-4 py-3 rounded-xl border border-zinc-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-4 rounded-xl font-bold text-white shadow-lg transition-all hover:scale-[1.02] active:scale-[0.98]">
                Entrar
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="/" class="text-zinc-500 hover:text-zinc-800 transition-colors flex items-center justify-center gap-2 text-sm">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Voltar ao início
            </a>
        </div>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
