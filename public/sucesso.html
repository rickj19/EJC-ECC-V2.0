<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso - EJC & ECC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-50 font-['Inter'] min-h-screen flex items-center justify-center p-4">
    <div class="max-w-lg w-full bg-white p-12 rounded-3xl shadow-xl border border-zinc-100 text-center animate-scale-in">
        <div class="mb-8 flex justify-center">
            <div class="p-6 bg-emerald-100 text-emerald-600 rounded-full animate-bounce">
                <i data-lucide="check-circle-2" class="w-16 h-16"></i>
            </div>
        </div>

        <h1 class="text-4xl font-bold text-zinc-900 mb-6">Inscrição Realizada!</h1>
        
        <div class="bg-zinc-50 p-8 rounded-2xl border border-zinc-100 mb-8 italic text-zinc-600 leading-relaxed">
            <p id="biblical-message" class="text-lg"></p>
            <p id="biblical-reference" class="mt-4 font-bold text-zinc-800 text-sm uppercase tracking-widest"></p>
        </div>

        <p class="text-zinc-400 text-sm">Você será redirecionado em alguns segundos...</p>
        
        <div class="mt-8">
            <div class="w-full bg-zinc-100 h-1 rounded-full overflow-hidden">
                <div class="bg-emerald-500 h-full animate-progress"></div>
            </div>
        </div>
    </div>

    <script src="/js/sucesso.js"></script>
</body>
</html>
