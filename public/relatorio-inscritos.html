<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Inscritos - Paróquia São Francisco das Chagas</title>
    <!-- Tailwind CSS para estilização moderna -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- CSS customizado da paróquia -->
    <link rel="stylesheet" href="/css/style.css">
    <!-- Fontes elegantes -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Biblioteca de ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Auth Guard: Proteção de Acesso -->
    <script src="/js/auth-guard.js"></script>
    <script>
        // Protege a página para permitir somente administradores gerais
        AuthGuard.protegerPagina({ perfil: 'admin', tipo_acesso: 'geral' });
    </script>
</head>
<body class="bg-church font-['Inter'] min-h-screen p-4 md:p-8">
    
    <!-- Overlay solene (oculto na impressão via CSS) -->
    <div class="fixed inset-0 bg-black/60 z-0 no-print"></div>

    <main class="relative z-10 max-w-7xl mx-auto animate-fade-in">
        
        <!-- Cabeçalho do Relatório -->
        <header class="text-center mb-8 text-cream print-header">
            <h1 class="text-3xl md:text-4xl font-bold font-['Cinzel'] tracking-widest text-gold-soft mb-2">
                Relatório de Inscritos
            </h1>
            <p class="text-sm uppercase tracking-[0.2em] text-beige opacity-90">
                Paróquia São Francisco das Chagas
            </p>
            <div class="w-20 h-0.5 bg-gold-soft mx-auto mt-4 no-print"></div>
        </header>

        <!-- Barra de Ferramentas (Oculta na Impressão) -->
        <div class="bg-brown-dark/60 backdrop-blur-xl p-6 rounded-3xl border border-gold-soft/20 shadow-2xl mb-8 no-print">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 items-end">
                
                <!-- Busca por Nome -->
                <div class="lg:col-span-2 space-y-2">
                    <label class="text-[10px] uppercase tracking-widest text-gold-soft font-bold">Buscar por Nome</label>
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-brown-medium"></i>
                        <input type="text" id="busca-nome" placeholder="Filtrar lista..." 
                               class="w-full bg-cream text-brown-dark pl-10 pr-4 py-2 rounded-xl outline-none text-sm font-medium">
                    </div>
                </div>

                <!-- Filtro Tipo -->
                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-widest text-gold-soft font-bold">Tipo</label>
                    <select id="filtro-tipo" class="w-full bg-cream text-brown-dark px-4 py-2 rounded-xl outline-none text-sm font-bold cursor-pointer">
                        <option value="todos">Todos</option>
                        <option value="ejc">EJC</option>
                        <option value="ecc">ECC</option>
                    </select>
                </div>

                <!-- Filtro Perfil -->
                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-widest text-gold-soft font-bold">Perfil</label>
                    <select id="filtro-perfil" class="w-full bg-cream text-brown-dark px-4 py-2 rounded-xl outline-none text-sm font-bold cursor-pointer">
                        <option value="todos">Todos</option>
                        <option value="jovem">Jovem</option>
                        <option value="casal">Casal</option>
                    </select>
                </div>

                <!-- Ações -->
                <div class="flex gap-2">
                    <button id="btn-imprimir" class="flex-1 bg-gold-soft text-brown-dark py-2 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-beige transition-all flex items-center justify-center gap-2">
                        <i data-lucide="printer" class="w-4 h-4"></i>
                        Imprimir
                    </button>
                    <a href="/painel-admin.html" class="flex-1 bg-brown-medium/40 text-cream border border-gold-soft/30 py-2 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-brown-medium/60 transition-all flex items-center justify-center gap-2 text-center">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i>
                        Voltar
                    </a>
                </div>
            </div>
        </div>

        <!-- Tabela de Relatório -->
        <div class="bg-white rounded-3xl overflow-hidden shadow-2xl print-container">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-brown-dark text-gold-soft uppercase text-[10px] tracking-[0.2em] font-bold">
                            <th class="px-6 py-4 border-b border-gold-soft/20">Foto</th>
                            <th class="px-6 py-4 border-b border-gold-soft/20">Dados Pessoais</th>
                            <th class="px-6 py-4 border-b border-gold-soft/20">Encontro / Perfil</th>
                            <th class="px-6 py-4 border-b border-gold-soft/20">Localização</th>
                            <th class="px-6 py-4 border-b border-gold-soft/20">Inscrição</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo" class="text-brown-dark">
                        <!-- Linhas injetadas via JS -->
                    </tbody>
                </table>
            </div>

            <!-- Estados Visuais -->
            <div id="loading-state" class="flex flex-col items-center justify-center py-20 text-brown-medium">
                <div class="w-10 h-10 border-4 border-gold-soft/20 border-t-gold-soft rounded-full animate-spin mb-4"></div>
                <p class="font-['Cinzel'] tracking-widest text-sm">Gerando relatório...</p>
            </div>

            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-brown-medium/60">
                <i data-lucide="file-x" class="w-12 h-12 mb-4 opacity-20"></i>
                <p class="font-['Cinzel'] tracking-widest">Nenhum dado para exibir</p>
            </div>
        </div>

        <!-- Rodapé do Relatório (Apenas na Impressão) -->
        <footer class="mt-8 text-center text-[10px] text-gray-400 hidden print-footer">
            <p>Relatório gerado em <span id="data-geracao"></span> • Paróquia São Francisco das Chagas</p>
        </footer>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/relatorio-inscritos.js"></script>
</body>
</html>
