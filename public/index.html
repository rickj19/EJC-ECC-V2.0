<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJC & ECC - Início</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-50 font-['Inter'] min-h-screen flex flex-col items-center justify-center p-4">
    <div class="max-w-4xl w-full space-y-8 text-center animate-fade-in">
        <header class="space-y-4">
            <h1 class="text-5xl font-bold text-zinc-900 tracking-tight">Bem-vindo</h1>
            <p class="text-zinc-500 text-lg">Escolha uma opção para continuar</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-12">
            <!-- EJC Section -->
            <div class="space-y-4">
                <h2 class="text-2xl font-semibold text-indigo-600">EJC</h2>
                <div class="flex flex-col gap-4">
                    <a href="/login.html?type=ejc" class="group bg-white p-6 rounded-2xl shadow-sm border border-zinc-200 hover:border-indigo-500 hover:shadow-md transition-all duration-300 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-indigo-50 rounded-xl text-indigo-600">
                                <i data-lucide="log-in"></i>
                            </div>
                            <span class="font-medium text-zinc-700">Entrar EJC</span>
                        </div>
                        <i data-lucide="chevron-right" class="text-zinc-400 group-hover:text-indigo-500 transition-colors"></i>
                    </a>
                    <a href="/cadastro.html?type=ejc" class="group bg-white p-6 rounded-2xl shadow-sm border border-zinc-200 hover:border-indigo-500 hover:shadow-md transition-all duration-300 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-indigo-50 rounded-xl text-indigo-600">
                                <i data-lucide="user-plus"></i>
                            </div>
                            <span class="font-medium text-zinc-700">Inscrição Encontrista EJC</span>
                        </div>
                        <i data-lucide="chevron-right" class="text-zinc-400 group-hover:text-indigo-500 transition-colors"></i>
                    </a>
                </div>
            </div>

            <!-- ECC Section -->
            <div class="space-y-4">
                <h2 class="text-2xl font-semibold text-emerald-600">ECC</h2>
                <div class="flex flex-col gap-4">
                    <a href="/login.html?type=ecc" class="group bg-white p-6 rounded-2xl shadow-sm border border-zinc-200 hover:border-emerald-500 hover:shadow-md transition-all duration-300 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-emerald-50 rounded-xl text-emerald-600">
                                <i data-lucide="log-in"></i>
                            </div>
                            <span class="font-medium text-zinc-700">Entrar ECC</span>
                        </div>
                        <i data-lucide="chevron-right" class="text-zinc-400 group-hover:text-emerald-500 transition-colors"></i>
                    </a>
                    <a href="/cadastro.html?type=ecc" class="group bg-white p-6 rounded-2xl shadow-sm border border-zinc-200 hover:border-emerald-500 hover:shadow-md transition-all duration-300 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-emerald-50 rounded-xl text-emerald-600">
                                <i data-lucide="users"></i>
                            </div>
                            <span class="font-medium text-zinc-700">Inscrição Encontrista ECC</span>
                        </div>
                        <i data-lucide="chevron-right" class="text-zinc-400 group-hover:text-emerald-500 transition-colors"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/index.js"></script>
</body>
</html>
