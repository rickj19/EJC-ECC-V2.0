<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - EJC & ECC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-50 font-['Inter'] min-h-screen flex items-center justify-center p-4 py-12">
    <div class="max-w-2xl w-full bg-white p-8 md:p-12 rounded-3xl shadow-xl border border-zinc-100 animate-slide-up">
        <div class="text-center mb-10">
            <div id="type-badge" class="inline-block px-4 py-1 rounded-full text-sm font-semibold mb-4"></div>
            <h1 class="text-3xl font-bold text-zinc-900">Ficha de Inscrição</h1>
            <p class="text-zinc-500 mt-2">Preencha todos os campos para participar</p>
        </div>

        <form id="cadastro-form" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label for="nome" class="text-sm font-medium text-zinc-700 block">Nome Completo</label>
                    <input type="text" id="nome" required class="w-full px-4 py-3 rounded-xl border border-zinc-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all">
                </div>
                <div class="space-y-2">
                    <label for="telefone" class="text-sm font-medium text-zinc-700 block">Telefone / WhatsApp</label>
                    <input type="tel" id="telefone" required class="w-full px-4 py-3 rounded-xl border border-zinc-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all" placeholder="(00) 00000-0000">
                </div>
                <div class="space-y-2">
                    <label for="cidade" class="text-sm font-medium text-zinc-700 block">Cidade</label>
                    <input type="text" id="cidade" required class="w-full px-4 py-3 rounded-xl border border-zinc-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all">
                </div>
                <div class="space-y-2">
                    <label for="paroquia" class="text-sm font-medium text-zinc-700 block">Paróquia</label>
                    <input type="text" id="paroquia" required class="w-full px-4 py-3 rounded-xl border border-zinc-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-zinc-700 block">Foto (Obrigatória)</label>
                <div id="photo-dropzone" class="relative border-2 border-dashed border-zinc-200 rounded-2xl p-8 text-center hover:border-indigo-400 transition-colors cursor-pointer group">
                    <input type="file" id="foto" accept="image/*" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <div id="photo-preview-container" class="hidden flex flex-col items-center">
                        <img id="photo-preview" src="#" alt="Preview" class="w-32 h-32 object-cover rounded-full border-4 border-white shadow-lg mb-4">
                        <span class="text-sm text-zinc-500">Clique para trocar a foto</span>
                    </div>
                    <div id="photo-placeholder" class="flex flex-col items-center">
                        <div class="p-4 bg-zinc-50 rounded-full text-zinc-400 group-hover:bg-indigo-50 group-hover:text-indigo-500 transition-colors mb-4">
                            <i data-lucide="camera" class="w-8 h-8"></i>
                        </div>
                        <p class="text-zinc-500">Arraste sua foto ou clique aqui</p>
                        <p class="text-xs text-zinc-400 mt-1">PNG, JPG ou JPEG (Máx. 5MB)</p>
                    </div>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-4 rounded-xl font-bold text-white shadow-lg transition-all hover:scale-[1.01] active:scale-[0.99] mt-4">
                Finalizar Inscrição
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="/" class="text-zinc-500 hover:text-zinc-800 transition-colors flex items-center justify-center gap-2 text-sm">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Cancelar e voltar
            </a>
        </div>
    </div>

    <script src="/js/cadastro.js"></script>
</body>
</html>
