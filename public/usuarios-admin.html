<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Usuários - Paróquia São Francisco das Chagas</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Scripts de Segurança e Sessão -->
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <script src="/js/session.js"></script>
    <!-- Auth Guard: Proteção de Acesso -->
    <script src="/js/auth-guard.js"></script>
    <script>
        // Protege a página para permitir somente administradores gerais
        AuthGuard.protegerPagina({ perfil: 'admin', tipo_acesso: 'geral' });
    </script>
</head>
<body class="bg-[#f5f5f5] min-h-screen font-['Inter'] text-[#1a1a1a]">
    <div class="container mx-auto px-4 py-12 max-w-4xl">
        <!-- Cabeçalho -->
        <header class="text-center mb-12">
            <h1 class="font-['Cinzel'] text-3xl md:text-5xl text-[#1a1a1a] tracking-[0.2em] mb-4">Gerenciar Usuários</h1>
            <div class="w-24 h-1 bg-gradient-to-r from-transparent via-[#8b5e3c] to-transparent mx-auto mt-4 rounded-full opacity-70"></div>
        </header>

        <!-- Formulário de Cadastro -->
        <div class="bg-white p-8 rounded-3xl border border-[#d1d5db] shadow-xl mb-12">
            <h2 class="font-['Cinzel'] text-xl text-[#1a1a1a] mb-6 flex items-center gap-2">
                <i data-lucide="user-plus" class="text-[#8b5e3c]"></i>
                Novo Usuário de Acesso
            </h2>
            <form id="form-usuario" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-[0.2em] text-[#333333] font-bold">Nome Completo</label>
                    <input type="text" id="nome" required placeholder="Nome do usuário" 
                           class="w-full bg-white text-[#1a1a1a] px-4 py-3">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-[0.2em] text-[#333333] font-bold">E-mail</label>
                    <input type="email" id="email" required placeholder="email@exemplo.com" 
                           class="w-full bg-white text-[#1a1a1a] px-4 py-3">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-[0.2em] text-[#333333] font-bold">Senha</label>
                    <input type="password" id="senha" required placeholder="••••••••" 
                           class="w-full bg-white text-[#1a1a1a] px-4 py-3">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-[0.2em] text-[#333333] font-bold">Tipo de Acesso</label>
                    <select id="tipo" required class="w-full bg-white text-[#1a1a1a] px-4 py-3 cursor-pointer">
                        <option value="ejc">EJC (Jovens)</option>
                        <option value="ecc">ECC (Casais)</option>
                        <option value="admin">Administrador Geral</option>
                    </select>
                </div>

                <!-- Áreas para Mensagens de Feedback -->
                <div id="msg-sucesso" class="hidden md:col-span-2 success-message flex items-center gap-2">
                    <i data-lucide="check-circle" class="w-5 h-5"></i>
                    <span id="txt-sucesso">Usuário cadastrado com sucesso!</span>
                </div>
                <div id="msg-erro" class="hidden md:col-span-2 error-message flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i>
                    <span id="txt-erro">Erro ao cadastrar usuário.</span>
                </div>

                <div class="md:col-span-2 flex justify-end gap-4 mt-4">
                    <a href="/painel-admin.html" class="bg-[#f5f5f5] hover:bg-[#e5e5e5] text-[#1a1a1a] px-8 py-3 rounded-xl font-bold border border-[#d1d5db] transition-all">
                        Voltar
                    </a>
                    <button type="button" id="btn-salvar" class="btn-premium">
                        <i data-lucide="save" class="w-5 h-5"></i>
                        Salvar Usuário
                    </button>
                </div>
            </form>
        </div>

        <!-- Lista de Usuários -->
        <div class="bg-white p-8 rounded-3xl border border-[#d1d5db] shadow-xl">
            <h2 class="font-['Cinzel'] text-xl text-[#1a1a1a] mb-6 flex items-center gap-2">
                <i data-lucide="users" class="text-[#8b5e3c]"></i>
                Usuários Cadastrados
            </h2>
            <div id="lista-usuarios" class="space-y-4">
                <!-- Usuários serão injetados aqui -->
                <div class="flex justify-center py-8">
                    <div class="w-8 h-8 border-2 border-[#8b5e3c]/20 border-t-[#8b5e3c] rounded-full animate-spin"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/usuarios-admin.js"></script>
</body>
</html>
