<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ECC - Paróquia São Francisco das Chagas</title>
    <!-- Tailwind CSS para estilização moderna e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- CSS customizado da paróquia -->
    <link rel="stylesheet" href="/css/style.css">
    <!-- Fontes elegantes para identidade religiosa -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Biblioteca de ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Scripts de Segurança e Sessão -->
    <script src="/js/session.js"></script>
    <!-- Auth Guard: Proteção de Acesso -->
    <script src="/js/auth-guard.js"></script>
    <script>
        // Protege a página para permitir somente usuários ECC
        AuthGuard.protegerPagina({ tipo_acesso: 'ecc' });
    </script>
</head>
<body class="bg-church font-['Inter'] min-h-screen flex flex-col items-center justify-center p-4">
    
    <!-- Overlay solene para garantir legibilidade -->
    <div class="fixed inset-0 bg-black/60 z-0"></div>

    <main class="relative z-10 max-w-4xl w-full animate-fade-in py-12">
        <!-- Cabeçalho do Painel -->
        <header class="text-center mb-12 text-cream">
            <div class="inline-block p-4 mb-6 rounded-full bg-brown-medium/30 backdrop-blur-lg border border-gold-soft/50 shadow-2xl">
                <i data-lucide="heart" class="w-12 h-12 text-gold-soft"></i>
            </div>
            <h1 class="text-4xl md:text-6xl font-bold font-['Cinzel'] tracking-widest text-gold-soft mb-4 drop-shadow-2xl">
                Painel ECC
            </h1>
            <p class="text-lg md:text-xl font-light text-beige tracking-[0.1em] uppercase opacity-90">
                Encontro de Casais com Cristo
            </p>
            <div class="w-24 h-1 bg-gradient-to-r from-transparent via-gold-soft to-transparent mx-auto mt-6 rounded-full opacity-70"></div>
        </header>

        <!-- Conteúdo Principal do Painel -->
        <section class="church-card p-8 md:p-12 text-center">
            <div class="mb-8">
                <h2 class="text-2xl font-bold font-['Cinzel'] text-brown-dark mb-4">Bem-vindo à Área do ECC</h2>
                <p class="text-brown-medium leading-relaxed">
                    Este é o seu espaço dedicado para gerenciar as atividades, inscrições e informações do Encontro de Casais com Cristo da Paróquia São Francisco das Chagas.
                </p>
            </div>

            <!-- Botões de Ação -->
            <div class="max-w-xs mx-auto space-y-4">
                <button type="button" onclick="window.location.href='/'" class="btn-church btn-ecc group w-full">
                    <i data-lucide="home" class="w-5 h-5 transition-transform group-hover:scale-110"></i>
                    <span class="font-bold tracking-widest">Voltar ao Início</span>
                </button>

                <button type="button" onclick="AuthGuard.logout()" class="btn-church group w-full" style="background: #5C4033; color: #F5EBDD;">
                    <i data-lucide="log-out" class="w-5 h-5 transition-transform group-hover:scale-110"></i>
                    <span class="font-bold tracking-widest">Sair do Painel</span>
                </button>
            </div>
        </section>

        <!-- Rodapé Institucional -->
        <footer class="mt-12 text-center text-cream/60">
            <p class="text-[10px] uppercase tracking-[0.4em]">© 2026 Paróquia São Francisco das Chagas • Área Restrita ECC</p>
        </footer>
    </main>

    <script>
        // Inicializa os ícones Lucide após o carregamento do DOM
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
